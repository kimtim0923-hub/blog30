<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI있다 TAAFT Tracker</title>

  <!-- CSS -->
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">

  <!-- Google API -->
  <script src="https://apis.google.com/js/api.js" async defer></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
</head>
<body>

  <!-- 헤더 -->
  <header class="header">
    <div class="header__logo">AI있다 TAAFT Tracker</div>
    <div class="header__auth">
      <button id="btn-sign-in" class="btn btn--primary">Google 로그인</button>
      <button id="btn-sign-out" class="btn btn--secondary" hidden>로그아웃</button>
    </div>
  </header>

  <!-- 메인 2컬럼 -->
  <main class="main">
    <!-- 좌측: 데이터 입력 -->
    <section class="panel panel--input">
      <h2>데이터 입력</h2>
      <textarea id="raw-input" class="textarea"
        placeholder="TAAFT 데이터를 여기에 붙여넣기...&#10;&#10;지원 형식:&#10;1. ToolName - Tagline&#10;   Category: X | Price: Y | Saves: Z&#10;&#10;또는 탭으로 구분된 테이블"></textarea>
      <button id="btn-parse" class="btn btn--primary">파싱하기</button>
    </section>

    <!-- 우측: 파싱 결과 미리보기 -->
    <section class="panel panel--preview">
      <h2>파싱 결과</h2>
      <div id="preview-area" class="preview preview--empty">
        TAAFT 데이터를 붙여넣고 "파싱하기" 버튼을 클릭하세요
      </div>
    </section>
  </main>

  <!-- 액션 버튼 -->
  <div class="action-bar">
    <button id="btn-save-log" class="btn btn--success" disabled>주간 로그에 저장</button>
    <button id="btn-update-db" class="btn btn--success" disabled>툴 DB 업데이트</button>
  </div>

  <!-- 상태 로그 -->
  <div id="status-log" class="status-log"></div>

  <!-- 푸터 -->
  <footer class="footer">
    AI있다 TAAFT Tracker &mdash; TAAFT 주간 인기 AI 툴 관리 도구
  </footer>

  <!-- JS (순서 중요: config → parser → sheets → ui → main) -->
  <script src="js/config.js"></script>
  <script src="js/parser.js"></script>
  <script src="js/sheets.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
